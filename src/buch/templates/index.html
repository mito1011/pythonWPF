<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bücher</title>
  </head>
  <body>
    <h1>Bücher</h1>
    <ul>
      {% for book in books %}
        <li><a href="/books/{{ book.id }}"><strong>{{ book.title }}</strong></a> by {{ book.author.full_name }} ({{ book.publisher.name }})</li>
      {% endfor %}
    </ul>
  </body>
</html>
